<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="<%= htmlWebpackPlugin.options.version %>">
    <title><%= htmlWebpackPlugin.options.name %></title>
    <link rel="stylesheet" type="text/css" href="index.css?v=<%= htmlWebpackPlugin.options.version %>" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
    <meta name="apple-mobile-web-app-title" content="ZetaSVG" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
</head>

<body>
    <div id="main"></div>
    <div id="info">
        <span id="worldTitle"></span>
        <span id="cameraInfo"></span>
    </div>
    <div id="virtual-keyboard-container"></div>
    <div id="overlay-container"></div>

    <script defer="defer" src="main.js?v=<%= htmlWebpackPlugin.options.version %>"></script>
</body>

</html>
